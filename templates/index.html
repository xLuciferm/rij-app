<!DOCTYPE html>
<html>
<head>
    <title>RIJ</title>
    <style>
        body {
            font-family: Arial;
            background: #f0f0f0;
        }

        .hoja {
            width: 600px;
            height: 800px;
            background: white;
            margin: 20px auto;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            position: relative;
        }

        .titulo {
            text-align: center;
            font-weight: bold;
        }

        .fecha {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .numero {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .foto-area {
            border: 2px dashed gray;
            width: 80%;
            height: 300px;
            margin: 100px auto;
            position: relative;
            overflow: hidden;
        }

        video, img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .boton-camara {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: red;
            border: 5px solid white;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
        }

        button {
            margin: 10px;
            padding: 10px;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 5px;
        }

        .acciones {
            text-align: center;
        }
    </style>
</head>
<body>

<div class="acciones">
    <button onclick="agregarHoja()">➕ Nueva hoja</button>
    <button onclick="generarPDF()">📄 Generar PDF</button>
</div>

<div id="contenedor"></div>

<script>
let fotos = [];

function crearPlantilla(numero) {
    let hoja = document.createElement("div");
    hoja.className = "hoja";

    hoja.innerHTML = `
        <div class="fecha">${new Date().toLocaleDateString()}</div>
        <div class="numero">${numero}</div>
        <div class="titulo">REUNION DE INICIO DE JORNADA</div>
        <div class="foto-area"></div>
    `;

    let area = hoja.querySelector(".foto-area");

    let video = document.createElement("video");
    video.autoplay = true;

    let boton = document.createElement("button");
    boton.className = "boton-camara";

    let canvas = document.createElement("canvas");

    // 📸 cámara trasera
    navigator.mediaDevices.getUserMedia({
        video: {
            facingMode: "environment",
            width: { ideal: 1280 },
            height: { ideal: 720 }
        }
    })
    .then(stream => video.srcObject = stream)
    .catch(err => alert("Error cámara: " + err));

    // 📸 tomar foto SOLO al presionar
    boton.onclick = () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        canvas.getContext("2d").drawImage(video, 0, 0);

        let img = document.createElement("img");
        img.src = canvas.toDataURL("image/png");

        area.innerHTML = "";
        area.appendChild(img);

        fotos.push(img.src);

        let seguir = confirm("¿Agregar otra hoja?");
        if (seguir) agregarHoja();
    };

    area.appendChild(video);
    area.appendChild(boton);

    return hoja;
}

function agregarHoja() {
    let numero = document.querySelectorAll(".hoja").length + 1;
    let hoja = crearPlantilla(numero);
    document.getElementById("contenedor").appendChild(hoja);
}

// 📄 generar PDF
function generarPDF() {
    let cantidad = prompt("¿Cuántas fotos del personal?");

    fetch("/generar", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            fotos: fotos,
            cantidad: cantidad
        })
    })
    .then(res => res.blob())
    .then(blob => {
        let url = window.URL.createObjectURL(blob);
        let a = document.createElement("a");
        a.href = url;
        a.download = "reporte.pdf";
        a.click();
    });
}

// primera hoja automática
window.onload = () => {
    agregarHoja();
};
</script>

</body>
</html>
