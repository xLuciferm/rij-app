<!DOCTYPE html>
<html>
<head>
<title>RIJ PRO</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f0f0f0;
}

/* =========================
   HOJA
========================= */

.hoja{
    width:600px;
    height:800px;

    margin:20px auto;

    position:relative;

    background-image:url("/static/plantilla.png");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    box-shadow:0 0 10px rgba(0,0,0,.2);
}

/* =========================
   ÁREA IMÁGENES
========================= */

.foto-area{

    position:absolute;

    top:150px;
    left:45px;

    width:510px;
    min-height:520px;

    border:2px dashed rgba(0,0,0,.3);

    padding:10px;

    box-sizing:border-box;

    transition:.2s;
}

.foto-area.dragover{
    background:rgba(0,123,255,.1);
    border:2px dashed #007bff;
}

/* =========================
   GALERÍA
========================= */

.galeria{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    margin-top:10px;
}

.galeria img{
    width:100%;
    height:160px;
    object-fit:cover;
    border-radius:6px;
    cursor:pointer;
}

/* =========================
   BOTONES
========================= */

.panel-hoja{
    position:absolute;
    bottom:-60px;
    width:100%;
    text-align:center;
}

.boton{
    padding:10px 15px;
    margin:5px;
    border:none;
    cursor:pointer;
    color:white;
    border-radius:5px;
}

.azul{
    background:#007bff;
}

.gris{
    background:#555;
}

.verde{
    background:green;
}

.rojo{
    background:#dc3545;
}

/* =========================
   MODAL
========================= */

.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.4);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal-content{
    background:white;
    padding:20px;
    border-radius:10px;
    width:260px;
    text-align:center;
}

.modal button{
    width:100%;
    margin:5px 0;
    padding:10px;
    border:none;
    cursor:pointer;
    border-radius:5px;
}

.btn-cambiar{
    background:#007bff;
    color:white;
}

.btn-eliminar{
    background:#dc3545;
    color:white;
}

.btn-cerrar{
    background:#555;
    color:white;
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:700px){

    .hoja{

        width:95vw;
        height:calc(95vw * 1.33);

        background-size:100% 100%;
    }

    .foto-area{

        top:18%;
        left:7%;

        width:86%;
        min-height:55%;

        padding:5px;
    }

    .galeria img{
        height:110px;
    }

}

</style>
</head>

<body>

<div id="contenedor"></div>

<!-- MODAL -->

<div id="modal" class="modal">

    <div class="modal-content">

        <h4>Opciones</h4>

        <button
            class="btn-cambiar"
            onclick="cambiarImagen()"
        >
            ✏️ Cambiar imagen
        </button>

        <button
            class="btn-eliminar"
            onclick="eliminarImagen()"
        >
            🗑 Eliminar imagen
        </button>

        <button
            class="btn-cerrar"
            onclick="cerrarModal()"
        >
            Cerrar
        </button>

    </div>

</div>

<script>

let imagenSeleccionada = null;
let hojaSeleccionada = null;

/* =========================
   CREAR HOJA
========================= */

function crearHoja(numero){

    let hoja = document.createElement("div");

    hoja.className = "hoja";

    hoja.fotos = [];

    hoja.innerHTML = `

        <div class="foto-area">

            <div style="text-align:center;">

                <div
                    style="
                        margin-bottom:10px;
                        font-size:12px;
                    "
                >
                    📎 Subir imagen
                </div>

                <button
                    class="boton gris btnSubir"
                >
                    📎 Subir imagen
                </button>

            </div>

            <div class="galeria"></div>

        </div>

        <div class="panel-hoja">

            <button class="boton verde btnAdd">
                ➕ Agregar hoja
            </button>

            <button class="boton rojo btnDel">
                🗑 Eliminar hoja
            </button>

            <button class="boton azul btnPDF">
                📄 Generar PDF
            </button>

        </div>
    `;

    let area = hoja.querySelector(".foto-area");

    let galeria = hoja.querySelector(".galeria");

    let btnSubir = hoja.querySelector(".btnSubir");

    let btnAdd = hoja.querySelector(".btnAdd");

    let btnPDF = hoja.querySelector(".btnPDF");

    let btnDel = hoja.querySelector(".btnDel");

    /* SUBIR */

    btnSubir.onclick = () => {

        let input = document.createElement("input");

        input.type = "file";

        input.accept = "image/*";

        input.multiple = true;

        input.onchange = e => {

            [...e.target.files].forEach(file => {

                cargarImagen(
                    file,
                    hoja,
                    galeria
                );

            });

        };

        input.click();

    };

    btnAdd.onclick = () => agregarHoja();

    btnPDF.onclick = () => generarPDF();

    btnDel.onclick = () => eliminarHoja(hoja);

    return hoja;
}

/* =========================
   CARGAR IMAGEN
========================= */

function cargarImagen(file, hoja, galeria){

    let reader = new FileReader();

    reader.onload = e => {

        let img = document.createElement("img");

        img.src = e.target.result;

        img.onclick = () => {

            imagenSeleccionada = img;

            hojaSeleccionada = hoja;

            document.getElementById("modal")
                .style.display = "flex";
        };

        galeria.appendChild(img);

        hoja.fotos.push(e.target.result);
    };

    reader.readAsDataURL(file);
}

/* =========================
   HOJAS
========================= */

function agregarHoja(){

    let cont = document.getElementById("contenedor");

    let n =
        document.querySelectorAll(".hoja")
        .length + 1;

    cont.appendChild(crearHoja(n));

    renumerarHojas();
}

function eliminarHoja(hoja){

    hoja.remove();

    renumerarHojas();
}

function renumerarHojas(){

    let hojas =
        document.querySelectorAll(".hoja");

    hojas.forEach(h => {

        h.querySelector(".btnAdd")
            .style.display = "none";

        h.querySelector(".btnDel")
            .style.display = "none";

        h.querySelector(".btnPDF")
            .style.display = "none";
    });

    if(hojas.length){

        let last = hojas[hojas.length - 1];

        last.querySelector(".btnAdd")
            .style.display = "inline-block";

        last.querySelector(".btnPDF")
            .style.display = "inline-block";

        last.querySelector(".btnDel")
            .style.display =
                hojas.length > 1
                ? "inline-block"
                : "none";
    }
}

/* =========================
   PDF
========================= */

async function generarPDF(){

    try{

        // NOMBRE
        let nombre = prompt(
            "Nombre del PDF:",
            "RIJ_CFE"
        );

        if(!nombre){
            return;
        }

        // LOADING
        let loading = document.createElement("div");

        loading.id = "loadingPDF";

        loading.innerHTML = `
            <div style="
                position:fixed;
                top:0;
                left:0;
                width:100%;
                height:100%;
                background:rgba(0,0,0,.5);
                z-index:9999;
                display:flex;
                justify-content:center;
                align-items:center;
                color:white;
                font-size:22px;
                font-family:Arial;
            ">
                Generando PDF...
            </div>
        `;

        document.body.appendChild(loading);

        let hojas =
            [...document.querySelectorAll(".hoja")]
            .map(h => h.fotos || []);

        const response = await fetch("/generar",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                hojas:hojas,

                nombre:nombre
            })
        });

        if(!response.ok){

            throw new Error("Error servidor");
        }

        // PDF
        const blob = await response.blob();

        // URL PDF
        const pdfURL =
            URL.createObjectURL(blob);

        // QUITAR LOADING
        document.getElementById("loadingPDF")
            .remove();

        // ABRIR PDF
        window.open(
            pdfURL,
            "_blank"
        );

    }catch(error){

        console.log(error);

        let loading =
            document.getElementById("loadingPDF");

        if(loading){
            loading.remove();
        }

        alert("Error al generar PDF");
    }
}

/* =========================
   MODAL
========================= */

function cerrarModal(){

    document.getElementById("modal")
        .style.display = "none";
}

function eliminarImagen(){

    if(imagenSeleccionada){

        let src = imagenSeleccionada.src;

        imagenSeleccionada.remove();

        hojaSeleccionada.fotos =
            hojaSeleccionada.fotos
            .filter(f => f !== src);
    }

    cerrarModal();
}

function cambiarImagen(){

    let input =
        document.createElement("input");

    input.type = "file";

    input.onchange = e => {

        let file = e.target.files[0];

        let reader = new FileReader();

        reader.onload = ev => {

            let newImg = ev.target.result;

            let oldSrc =
                imagenSeleccionada.src;

            hojaSeleccionada.fotos =
                hojaSeleccionada.fotos.map(f =>
                    f === oldSrc
                    ? newImg
                    : f
                );

            imagenSeleccionada.src =
                newImg;
        };

        reader.readAsDataURL(file);
    };

    input.click();

    cerrarModal();
}

window.onload = () => agregarHoja();

</script>

</body>
</html>
