<!DOCTYPE html>
<html>
<head>
<title>RIJ PRO</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f0f0f0;
}

.hoja {
    width: 600px;
    height: 800px;
    background: white;
    margin: 20px auto;
    padding: 20px;
    position: relative;
}

.header {
    background: #0a7a3d;
    color: white;
    padding: 10px;
    display: flex;
    justify-content: space-between;
}

.footer {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 40px;
    background: #0a7a3d;
}

.foto-area {
    border: 2px dashed gray;
    width: 80%;
    height: 300px;
    margin: 100px auto;
    display: flex;
    align-items: center;
    justify-content: center;
}

.boton-agregar {
    padding: 15px 25px;
    background: #007bff;
    color: white;
    border: none;
    font-size: 16px;
}

/* 📸 FULLSCREEN */
#camaraFull {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    display: none;
    z-index: 999;
}

#camaraFull video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 📸 BOTÓN TOMAR FOTO */
#btnFoto {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 15px 25px;
    font-size: 18px;
    background: red;
    color: white;
    border: none;
}

/* ❌ BOTÓN CERRAR */
#btnCerrar {
    position: absolute;
    top: 20px;
    left: 20px;
    background: white;
    padding: 10px;
}
</style>

</head>
<body>

<div id="contenedor"></div>

<!-- 📸 CAMARA FULLSCREEN -->
<div id="camaraFull">
    <video id="video" autoplay></video>
    <button id="btnFoto">Tomar foto</button>
    <button id="btnCerrar">❌</button>
</div>

<script>
let fotos = [];
let hojaActual = null;
let stream = null;

// 📄 CREAR HOJA
function crearHoja(numero) {
    let hoja = document.createElement("div");
    hoja.className = "hoja";

    hoja.innerHTML = `
        <div class="header">
            <span>REUNION DE INICIO DE JORNADA</span>
            <span>${numero}</span>
        </div>

        <div class="foto-area">
            <button class="boton-agregar">Agregar foto</button>
        </div>

        <div class="footer"></div>
    `;

    let btn = hoja.querySelector(".boton-agregar");

    btn.onclick = () => {
        hojaActual = hoja;
        abrirCamara();
    };

    return hoja;
}

// 📸 ABRIR CAMARA
function abrirCamara() {
    document.getElementById("camaraFull").style.display = "block";

    navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" }
    })
    .then(s => {
        stream = s;
        document.getElementById("video").srcObject = stream;
    })
    .catch(err => alert("Error cámara: " + err));
}

// 📸 TOMAR FOTO (ÚNICO LUGAR DONDE SE GUARDA)
document.getElementById("btnFoto").onclick = () => {

    let video = document.getElementById("video");
    let canvas = document.createElement("canvas");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    canvas.getContext("2d").drawImage(video, 0, 0);

    let img = document.createElement("img");
    img.src = canvas.toDataURL("image/png");
    img.style.width = "100%";

    let area = hojaActual.querySelector(".foto-area");
    area.innerHTML = "";
    area.appendChild(img);

    fotos.push(img.src);

    cerrarCamara();

    if (confirm("¿Agregar otra hoja?")) {
        agregarHoja();
    }
};

// ❌ CERRAR CAMARA (NO GUARDA NADA)
document.getElementById("btnCerrar").onclick = cerrarCamara;

function cerrarCamara() {
    document.getElementById("camaraFull").style.display = "none";

    if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
    }
}

// ➕ AGREGAR HOJA
function agregarHoja() {
    let numero = document.querySelectorAll(".hoja").length + 1;
    document.getElementById("contenedor").appendChild(crearHoja(numero));
}

// INICIO
window.onload = () => {
    agregarHoja();
};
</script>

</body>
</html>
