<!DOCTYPE html>
<html>
<head>
<title>RIJ PRO</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f0f0f0;
}

.hoja {
    width: 600px;
    height: 800px;
    background: white;
    margin: 20px auto;
    padding: 20px;
    position: relative;
}

.header {
    background: #0a7a3d;
    color: white;
    padding: 10px;
    display: flex;
    justify-content: space-between;
}

.footer {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 40px;
    background: #0a7a3d;
}

.foto-area {
    border: 2px dashed gray;
    width: 80%;
    height: 300px;
    margin: 100px auto;
    display: flex;
    align-items: center;
    justify-content: center;
}

.boton-agregar {
    padding: 15px 25px;
    background: #007bff;
    color: white;
    border: none;
    font-size: 16px;
}

/* CAMARA */
#camaraFull {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    display: none;
    z-index: 999;
}

#camaraFull video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

#btnFoto {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 15px 25px;
    font-size: 18px;
    background: red;
    color: white;
    border: none;
}

#btnCerrar {
    position: absolute;
    top: 20px;
    left: 20px;
    background: white;
    padding: 10px;
}

#loadingCam {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
}

/* BOTÓN PDF */
#btnGenerarPDF {
    padding: 15px 25px;
    background: green;
    color: white;
    border: none;
    font-size: 16px;
    cursor: pointer;
}
</style>

</head>
<body>

<div id="contenedor"></div>

<!-- BOTÓN PDF -->
<div style="text-align:center; margin:20px;">
    <button id="btnGenerarPDF">Generar PDF</button>
</div>

<!-- CAMARA -->
<div id="camaraFull">
    <video id="video" autoplay playsinline></video>
    <p id="loadingCam">Cargando cámara...</p>
    <button id="btnFoto" disabled>Tomar foto</button>
    <button id="btnCerrar">❌</button>
</div>

<script>

let fotos = [];
let hojaActual = null;
let stream = null;

// 📄 HOJA
function crearHoja(numero) {
    let hoja = document.createElement("div");
    hoja.className = "hoja";

    hoja.innerHTML = `
        <div class="header">
            <span>REUNION DE INICIO DE JORNADA</span>
            <span>${numero}</span>
        </div>

        <div class="foto-area">
            <button class="boton-agregar">Agregar foto</button>
        </div>

        <div class="footer"></div>
    `;

    hoja.querySelector(".boton-agregar").onclick = () => {
        hojaActual = hoja;
        abrirCamara();
    };

    return hoja;
}

// 📸 CAMARA
function abrirCamara() {
    let camara = document.getElementById("camaraFull");
    let video = document.getElementById("video");
    let btnFoto = document.getElementById("btnFoto");
    let loading = document.getElementById("loadingCam");

    camara.style.display = "block";
    btnFoto.disabled = true;
    loading.style.display = "block";

    navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" }
    })
    .then(s => {
        stream = s;
        video.srcObject = stream;

        video.onloadedmetadata = () => {
            video.play();
            btnFoto.disabled = false;
            loading.style.display = "none";
        };
    })
    .catch(err => alert("Error cámara: " + err));
}

// 📸 TOMAR FOTO (CORREGIDO)
document.getElementById("btnFoto").onclick = () => {

    let video = document.getElementById("video");

    if (!video.videoWidth) {
        alert("Espera a que cargue la cámara");
        return;
    }

    let canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    let ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);

    let base64 = canvas.toDataURL("image/png");

    // mostrar en pantalla
    let img = document.createElement("img");
    img.src = base64;
    img.style.width = "100%";

    hojaActual.querySelector(".foto-area").innerHTML = "";
    hojaActual.querySelector(".foto-area").appendChild(img);

    // 🔥 GUARDADO SEGURO
    fotos.push(base64);
    console.log("Fotos guardadas:", fotos.length);

    cerrarCamara();

    if (confirm("¿Agregar otra hoja?")) {
        agregarHoja();
    }
};

// ❌ CERRAR CAMARA
document.getElementById("btnCerrar").onclick = cerrarCamara;

function cerrarCamara() {
    document.getElementById("camaraFull").style.display = "none";

    if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
    }
}

// ➕ HOJAS
function agregarHoja() {
    let num = document.querySelectorAll(".hoja").length + 1;
    document.getElementById("contenedor").appendChild(crearHoja(num));
}

// 🟢 GENERAR PDF
document.getElementById("btnGenerarPDF").onclick = () => {

    if (fotos.length === 0) {
        alert("No hay fotos");
        return;
    }

    fetch("/generar", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            fotos: fotos,
            cantidad: fotos.length
        })
    })
    .then(res => res.blob())
    .then(blob => {
        let url = URL.createObjectURL(blob);
        let a = document.createElement("a");
        a.href = url;
        a.download = "RIJ_CFE.pdf";
        a.click();
    });
};

// INICIO
window.onload = () => agregarHoja();

</script>

</body>
</html>
