<!DOCTYPE html>
<html>
<head>
<title>RIJ PRO</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f0f0f0;
}

/* 📄 HOJA */
.hoja {
    width: 600px;
    height: 800px;
    background: white;
    margin: 20px auto;
    padding: 20px;
}

/* HEADER */
.header {
    background: #0a7a3d;
    color: white;
    padding: 10px;
    display: flex;
    justify-content: space-between;
}

/* 📸 RECUADRO */
.foto-area {
    border: 2px dashed gray;
    width: 80%;
    height: 300px;
    margin: 80px auto 10px auto;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

/* 👇 IMAGEN DENTRO DEL RECUADRO */
.foto-area img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* BOTONES */
.boton {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    cursor: pointer;
    color: white;
    border-radius: 5px;
}

.azul { background: #007bff; }
.gris { background: #555; }
.verde { background: green; }

/* 📌 BOTONES INFERIORES CENTRADOS */
.panel-hoja {
    text-align: center;
    margin-top: 15px;
}
</style>

</head>

<body>

<div id="contenedor"></div>

<script>

let hojaActual = null;
let fotos = [];

/* =========================
   HOJA
========================= */
function crearHoja(numero) {

    let hoja = document.createElement("div");
    hoja.className = "hoja";

    hoja.innerHTML = `
        <div class="header">
            <span>REUNIÓN RIJ</span>
            <span>Hoja ${numero}</span>
        </div>

        <div class="foto-area">
            <div style="text-align:center;">
                <div style="margin-bottom:10px;font-size:12px;">
                    Arrastra o pega imagen (Ctrl + V)
                </div>

                <button class="boton azul">📸 Tomar foto</button>
                <button class="boton gris">📎 Subir imagen</button>
            </div>
        </div>

        <div class="panel-hoja">
            <button class="boton verde">➕ Agregar hoja</button>
            <button class="boton azul">📄 Generar PDF</button>
        </div>
    `;

    let area = hoja.querySelector(".foto-area");

    let btnCam = hoja.querySelectorAll(".boton")[0];
    let btnSubir = hoja.querySelectorAll(".boton")[1];
    let btnAgregar = hoja.querySelectorAll(".panel-hoja button")[0];
    let btnPDF = hoja.querySelectorAll(".panel-hoja button")[1];

    // ➕ hoja
    btnAgregar.onclick = agregarHoja;

    // 📄 PDF
    btnPDF.onclick = generarPDF;

    // 📸 cámara
    btnCam.onclick = () => {
        hojaActual = area;
        abrirCamara();
    };

    // 📁 subir imagen
    btnSubir.onclick = () => {
        let input = document.createElement("input");
        input.type = "file";
        input.accept = "image/*";

        input.onchange = e => {
            cargarImagen(e.target.files[0], area);
        };

        input.click();
    };

    return hoja;
}

/* =========================
   SUBIR IMAGEN (🔥 FALTABA ESTO)
========================= */
function cargarImagen(file, area) {

    let reader = new FileReader();

    reader.onload = e => {

        let img = document.createElement("img");
        img.src = e.target.result;

        area.innerHTML = "";
        area.appendChild(img);

        fotos.push(e.target.result);
    };

    reader.readAsDataURL(file);
}

/* =========================
   HOJAS
========================= */
function agregarHoja() {
    let n = document.querySelectorAll(".hoja").length + 1;
    document.getElementById("contenedor").appendChild(crearHoja(n));
}

/* =========================
   PDF
========================= */
function generarPDF() {
    fetch("/generar", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            fotos: fotos,
            cantidad: fotos.length,
            nombre: "RIJ_CFE"
        })
    })
    .then(res => res.blob())
    .then(blob => {
        let url = URL.createObjectURL(blob);
        let a = document.createElement("a");
        a.href = url;
        a.download = "RIJ_CFE.pdf";
        a.click();
    });
}

window.onload = agregarHoja;

</script>

</body>
</html>
