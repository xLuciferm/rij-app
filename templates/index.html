<!DOCTYPE html>
<html>
<head>
<title>RIJ PRO</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f0f0f0;
}

.hoja {
    width: 600px;
    height: 800px;
    background: white;
    margin: 20px auto;
    padding: 20px;
    position: relative;
}

.foto-area {
    border: 2px dashed gray;
    width: 80%;
    height: 300px;
    margin: 100px auto;
    display: flex;
    align-items: center;
    justify-content: center;
}

.boton-agregar {
    padding: 15px;
    background: #007bff;
    color: white;
    border: none;
}

#camaraFull {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    display: none;
    z-index: 999;
}

#camaraFull video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

#btnFoto {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: red;
    border: 5px solid white;
}

#btnCerrar {
    position: absolute;
    top: 20px;
    left: 20px;
    background: white;
    padding: 10px;
}
</style>

</head>
<body>

<div id="contenedor"></div>

<!-- 📸 CAMARA FULLSCREEN -->
<div id="camaraFull">
    <video id="video" autoplay></video>
    <button id="btnFoto"></button>
    <button id="btnCerrar">❌</button>
</div>

<script>
let fotos = [];
let hojaActual = null;
let stream;

// 📄 crear hoja
function crearHoja() {
    let hoja = document.createElement("div");
    hoja.className = "hoja";

    hoja.innerHTML = `
        <h3 style="text-align:center;">REUNION DE INICIO DE JORNADA</h3>
        <div class="foto-area">
            <button class="boton-agregar">Agregar imagen</button>
        </div>
    `;

    let btn = hoja.querySelector(".boton-agregar");

    btn.onclick = () => {
        hojaActual = hoja;
        abrirCamara();
    };

    return hoja;
}

// 📸 abrir cámara
function abrirCamara() {
    document.getElementById("camaraFull").style.display = "block";

    navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" }
    })
    .then(s => {
        stream = s;
        document.getElementById("video").srcObject = stream;
    });
}

// 📸 tomar foto
document.getElementById("btnFoto").onclick = () => {

    let video = document.getElementById("video");
    let canvas = document.createElement("canvas");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    canvas.getContext("2d").drawImage(video, 0, 0);

    let img = document.createElement("img");
    img.src = canvas.toDataURL("image/png");

    let area = hojaActual.querySelector(".foto-area");
    area.innerHTML = "";
    area.appendChild(img);

    fotos.push(img.src);

    cerrarCamara();

    if (confirm("¿Agregar otra hoja?")) {
        agregarHoja();
    }
};

// ❌ cerrar cámara
document.getElementById("btnCerrar").onclick = cerrarCamara;

function cerrarCamara() {
    document.getElementById("camaraFull").style.display = "none";

    if (stream) {
        stream.getTracks().forEach(track => track.stop());
    }
}

// ➕ agregar hoja
function agregarHoja() {
    document.getElementById("contenedor").appendChild(crearHoja());
}

// inicial
window.onload = () => {
    agregarHoja();
};
</script>

</body>
</html>
